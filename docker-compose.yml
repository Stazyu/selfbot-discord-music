version: '3.8'

services:
  discord-music-bot:
    build: .
    container_name: discord-music-selfbot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_PREFIX=${DISCORD_PREFIX:-?}
      - ALLOWED_USERS=${ALLOWED_USERS:-}
      - STATE_FILE=/app/data/state.json
    env_file:
      - .env
    volumes:
      - ./data:/app/data
